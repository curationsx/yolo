name: CURATIONS.DEV

on:
  pull_request:
    paths:
      - "agent-worker/**"
      - "catalog-site/**"
      - "cookbooks/**"
      - "prompts/**"
      - "software/**"
      - "schemas/cookbook-entry.schema.json"
      - "schemas/software-entry.schema.json"
      - "catalog.json"
      - "tools/yolo.py"
      - ".github/workflows/catalog-site.yml"
  push:
    branches: [main]
    paths:
      - "agent-worker/**"
      - "catalog-site/**"
      - "cookbooks/**"
      - "prompts/**"
      - "software/**"
      - "schemas/cookbook-entry.schema.json"
      - "schemas/software-entry.schema.json"
      - "catalog.json"
      - "tools/yolo.py"
      - ".github/workflows/catalog-site.yml"
  workflow_dispatch:
    inputs:
      generate_oracle_baseline:
        description: "Generate Linux Visual Oracle candidates for human review"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: curations-dev-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Validate site + gateway
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Validate source data
        run: |
          python tools/yolo.py doctor
          python tools/yolo.py catalog
          git diff --exit-code -- catalog.json

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            catalog-site/package-lock.json
            agent-worker/package-lock.json
            agent-worker/copilot-runtime/package-lock.json

      - name: Build Astro site
        working-directory: catalog-site
        env:
          ASTRO_BASE: /
          ASTRO_SITE: https://curations.dev
          PUBLIC_AGENT_API: https://api.curations.dev
        run: |
          npm ci
          npm run build

      - name: Install Visual Oracle browser
        working-directory: catalog-site
        run: npx playwright install --with-deps chromium

      - name: Run Visual Oracle contract
        working-directory: catalog-site
        run: npm run test:visual:ci

      - name: Generate Linux Visual Oracle candidates
        if: github.event_name == 'workflow_dispatch' && inputs.generate_oracle_baseline
        working-directory: catalog-site
        env:
          GENERATE_ORACLE_BASELINE: "1"
        run: npm run test:visual:update

      - name: Publish Linux Visual Oracle candidates
        if: github.event_name == 'workflow_dispatch' && inputs.generate_oracle_baseline
        uses: actions/upload-artifact@v7
        with:
          name: visual-oracle-linux-candidates
          path: catalog-site/test/visual-oracle.spec.mjs-snapshots/*-linux.png
          if-no-files-found: error

      - name: Test and typecheck Cloudflare Worker
        working-directory: agent-worker
        run: |
          npm ci
          npm test
          npm run check
          npx wrangler deploy --dry-run

      - name: Test isolated Copilot runtime
        working-directory: agent-worker/copilot-runtime
        run: |
          npm ci
          npm test

      - name: Check patch hygiene
        run: git diff --check

  # The legacy "Deploy Worker + Pages" (Cloudflare) job was retired here on
  # 2026-07-19, completing the Phase 0 mandate in
  # docs/PRD-project-evidence-registry.md §12: production DNS resolves
  # curations.dev to Azure Static Web Apps and api.curations.dev to Azure
  # Container Apps (completed cutover), so the Cloudflare deploy could only
  # fail (missing credentials) or, worse, recreate a second production
  # authority. Production deploys happen exclusively through
  # .github/workflows/azure-deploy.yml (workflow_dispatch, environment-gated).
  # The Worker source remains platform-neutral and the wrangler dry-run above
  # still verifies it compiles for the Cloudflare target.
