name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 8 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    # Guardrail: this advanced CodeQL workflow must run only after
    # repository default setup is disabled. Otherwise SARIF upload fails
    # with "advanced configurations cannot be processed when default setup
    # is enabled". Flip repo/org variable CODEQL_ADVANCED_ENABLED=true only
    # after switching code scanning to advanced setup.
    if: ${{ vars.CODEQL_ADVANCED_ENABLED == 'true' }}
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
