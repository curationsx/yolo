name: Human Actions

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review
      - converted_to_draft
      - review_requested
      - review_request_removed
  pull_request_review:
    types:
      - submitted
      - edited
      - dismissed
  workflow_dispatch:
    inputs:
      pull_number:
        description: "Optional pull request number to refresh"
        required: false
        type: number
  schedule:
    # Offset minute is intentionally non-zero to avoid top-of-hour bursts.
    - cron: "23 */6 * * *"

permissions:
  contents: read
  checks: read
  statuses: read
  pull-requests: read
  issues: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Update Human Actions advisory comment
        # API-only workflow: do not check out or execute untrusted PR code.
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- curations-human-actions -->";
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const now = new Date().toISOString();

            function task(done, text) {
              return `- [${done ? "x" : " "}] ${text}`;
            }

            async function getReviewDecision(number) {
              const result = await github.graphql(
                `query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $number) {
                      reviewDecision
                    }
                  }
                }`,
                { owner, repo, number },
              );
              return result.repository.pullRequest.reviewDecision;
            }

            async function upsertComment(prNumber) {
              const { data: pr } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: prNumber,
              });
              if (pr.state !== "open") {
                return;
              }

              const reviewDecision = await getReviewDecision(prNumber);
              const body = pr.body || "";
              const uncheckedTasks = (body.match(/^- \[ \] /gim) || []).length;
              const requestedUsers = pr.requested_reviewers.map((r) => `@${r.login}`);
              const requestedTeams = pr.requested_teams.map((t) => `@${t.slug}`);
              const requestedReviewCount = requestedUsers.length + requestedTeams.length;

              const checksResp = await github.rest.checks.listForRef({
                owner,
                repo,
                ref: pr.head.sha,
                per_page: 100,
              });
              const checkRuns = checksResp.data.check_runs || [];
              const failingCheckRuns = checkRuns.filter((run) =>
                ["failure", "cancelled", "timed_out", "action_required", "startup_failure", "stale"].includes(run.conclusion)
              );
              const pendingCheckRuns = checkRuns.filter((run) =>
                ["queued", "in_progress", "waiting", "requested", "pending"].includes(run.status)
              );

              const { data: combinedStatus } = await github.rest.repos.getCombinedStatusForRef({
                owner,
                repo,
                ref: pr.head.sha,
              });
              const statusContexts = combinedStatus.statuses || [];
              const failingStatuses = statusContexts.filter((s) => ["error", "failure"].includes(s.state));
              const pendingStatuses = statusContexts.filter((s) => s.state === "pending");

              const hasVisibleChecks = checkRuns.length > 0 || statusContexts.length > 0;
              const hasPendingChecks = pendingCheckRuns.length > 0 || pendingStatuses.length > 0;
              const hasFailingChecks = failingCheckRuns.length > 0 || failingStatuses.length > 0;
              const hasChangesRequested = reviewDecision === "CHANGES_REQUESTED";
              const hasMergeConflicts = pr.mergeable_state === "dirty";
              const needsHumanReview = requestedReviewCount > 0 || reviewDecision !== "APPROVED";

              const checkLinks = [
                ...failingCheckRuns.slice(0, 4).map((run) => `[${run.name}](${run.html_url})`),
                ...failingStatuses
                  .slice(0, Math.max(0, 4 - Math.min(4, failingCheckRuns.length)))
                  .map((s) => `[${s.context}](${s.target_url || pr.html_url})`),
              ];

              const blockers =
                pr.draft ||
                uncheckedTasks > 0 ||
                hasChangesRequested ||
                needsHumanReview ||
                hasPendingChecks ||
                hasFailingChecks ||
                hasMergeConflicts ||
                !hasVisibleChecks;

              const lines = [
                marker,
                "## Human Actions",
                "",
                "_Advisory automation only: repository rules, required checks, and branch protections remain authoritative._",
                "",
                task(!pr.draft, "Mark draft ready for review."),
                task(
                  uncheckedTasks === 0,
                  uncheckedTasks === 0
                    ? "Complete unchecked task-list items in the PR body."
                    : `Complete unchecked task-list items in the PR body (${uncheckedTasks} remaining).`,
                ),
                task(!hasChangesRequested, "Address changes-requested reviews."),
                task(
                  !needsHumanReview,
                  requestedReviewCount > 0
                    ? `Obtain requested/required human review (${[...requestedUsers, ...requestedTeams].join(", ")}).`
                    : "Obtain requested or required human review.",
                ),
                task(
                  !hasFailingChecks,
                  hasFailingChecks
                    ? `Investigate failing checks: ${checkLinks.join(", ")}`
                    : "Investigate failing checks (if any).",
                ),
                task(!hasPendingChecks, "Investigate pending/queued checks until completion."),
                task(hasVisibleChecks, "Verify required checks are visible (do not assume success when none are visible)."),
                task(!hasMergeConflicts, "Resolve merge conflicts."),
                task(!blockers, "Merge after policy requirements are met."),
                "",
                "### Observed status",
                `- PR: [#${pr.number}](${pr.html_url}) · ${pr.draft ? "Draft" : "Ready for review"}`,
                `- Review decision: ${reviewDecision || "UNKNOWN"}`,
                `- Requested reviewers: ${requestedReviewCount}`,
                `- Check runs: ${checkRuns.length} total · ${failingCheckRuns.length} failing · ${pendingCheckRuns.length} pending`,
                `- Status contexts: ${statusContexts.length} total · ${failingStatuses.length} failing · ${pendingStatuses.length} pending`,
                `- Mergeable state: ${pr.mergeable_state || "unknown"}`,
                `- Last refresh: ${now}`,
              ];

              const commentBody = lines.join("\n");

              const { data: comments } = await github.rest.issues.listComments({
                owner,
                repo,
                issue_number: prNumber,
                per_page: 100,
              });
              const existing = comments.find((comment) => (comment.body || "").includes(marker));

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body: commentBody,
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: prNumber,
                  body: commentBody,
                });
              }
            }

            let prNumbers = [];
            if (context.eventName === "workflow_dispatch") {
              const maybeNumber = Number(context.payload.inputs?.pull_number || "");
              if (Number.isInteger(maybeNumber) && maybeNumber > 0) {
                prNumbers = [maybeNumber];
              }
            }

            if (prNumbers.length === 0 && (context.eventName === "pull_request_target" || context.eventName === "pull_request_review")) {
              const number = context.payload.pull_request?.number;
              if (number) {
                prNumbers = [number];
              }
            }

            if (prNumbers.length === 0) {
              const { data: pulls } = await github.rest.pulls.list({
                owner,
                repo,
                state: "open",
                sort: "updated",
                direction: "desc",
                per_page: 100,
              });
              prNumbers = pulls.map((p) => p.number);
            }

            for (const number of prNumbers) {
              await upsertComment(number);
            }
